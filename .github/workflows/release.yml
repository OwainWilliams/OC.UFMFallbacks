name: Release Package

# This action will start when a correctly formatted tag is pushed (e.g. 0.1.0)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to run workflow'
        required: true
        type: string
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:

    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/OC.UFMFallbacks/OC.UFMFallbacks.csproj

    - name: Build
      run: dotnet build src/OC.UFMFallbacks/OC.UFMFallbacks.csproj -c Release --no-restore /p:Version=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    - name: Pack
      run: dotnet pack src/OC.UFMFallbacks/OC.UFMFallbacks.csproj -c Release --no-build --output nupkgs /p:Version=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    - name: Push to NuGet
      run: dotnet nuget push nupkgs/*.nupkg -k ${{secrets.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json
